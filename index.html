<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <title>Yêu tớ không?</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- Âm thanh hiệu ứng -->
  <audio id="soundEffect" src="click.mp3" preload="auto"></audio>

  <!-- Hình ảnh thay đổi -->
  <img id="mainImg" src="img/0.jpg" alt="cute">
  <h2 id="question">Bạn có yêu tớ khôngggg?</h2>

  <!-- Nút chọn -->
  <div id="buttons">
    <button id="yesBtn">Có</button>
    <button id="noBtn">Không</button>
  </div>

  <!-- Ô nhập khi chọn "Có" -->
  <div id="textInput">
    <p>Viết gì đó nè:</p>
    <input type="text" placeholder="..." />
  </div>

  <!-- Gắn JS -->
  <script src="script.js"></script>
</body>
</html>
